name: Deploy to GitHub Pages

on:
  # Deploy on every push to main…
  push:
    branches: [main]
  # …and allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow this workflow to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; don't cancel it.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Build with Astro
        uses: withastro/action@v6
        with:
          # Astro 6 requires Node >= 22.12; pin so the runner never
          # falls back to an unsupported version.
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
